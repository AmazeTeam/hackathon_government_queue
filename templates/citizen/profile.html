{% extends 'base.html' %}
{% block title %}Profile – GovQueue{% endblock %}
{% block content %}
<div class="with-sidebar">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-lbl">Citizen</div>
      <a href="/citizen" class="sidebar-item">🏠 Dashboard</a>
      <a href="/citizen/book" class="sidebar-item">📋 Join Queue</a>
      <a href="/citizen/bookings" class="sidebar-item">📄 My Tickets</a>
      <a href="/citizen/track" class="sidebar-item">🔍 Track Queue</a>
      <a href="/citizen/profile" class="sidebar-item active">👤 Profile</a>
    </div>
  </div>
  <div class="main-area">
    <div class="page-header"><h2>Profile</h2><p>Manage your account details</p></div>
    <div class="card" style="max-width:480px">
      <div class="card-title">Personal Information</div>
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="input" name="full_name" value="{{ u.full_name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input class="input" value="{{ u.phone_number }}" disabled style="background:#f9fafb">
        </div>
        <div class="form-group">
          <label class="form-label">Preferred Language</label>
          <select class="input" name="preferred_language">
            <option value="en" {% if u.preferred_language == 'en' %}selected{% endif %}>English</option>
            <option value="ar" {% if u.preferred_language == 'ar' %}selected{% endif %}>العربية</option>
          </select>
        </div>
        <button class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
