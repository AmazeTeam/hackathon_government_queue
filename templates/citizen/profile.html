{% extends 'base.html' %}
{% block title %}Profile – GovQueue{% endblock %}
{% block content %}
<div class="with-sidebar">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-lbl">Citizen</div>
      <a href="/citizen" class="sidebar-item">🏠 Dashboard</a>
      <a href="/citizen/book" class="sidebar-item">📋 Book Queue</a>
      <a href="/citizen/bookings" class="sidebar-item">📄 My Bookings</a>
      <a href="/citizen/track" class="sidebar-item">🔍 Track Queue</a>
      <a href="/citizen/profile" class="sidebar-item active">👤 Profile</a>
    </div>
  </div>
  <div class="main-area">
    <div class="page-header"><h2>Profile</h2><p>Manage your account details</p></div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Personal Information</div>
        <form method="POST">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="input" name="full_name" value="{{ u.full_name }}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input class="input" value="{{ u.phone }}" disabled style="background:#f9fafb">
          </div>
          <div class="form-group">
            <label class="form-label">National ID</label>
            <input class="input" value="{{ u.national_id or '—' }}" disabled style="background:#f9fafb">
          </div>
          <div class="form-group">
            <label class="form-label">Preferred Language</label>
            <select class="input" name="preferred_language">
              <option value="en" {% if u.preferred_language == 'en' %}selected{% endif %}>English</option>
              <option value="ar" {% if u.preferred_language == 'ar' %}selected{% endif %}>العربية</option>
            </select>
          </div>
          <button class="btn btn-primary">Save Changes</button>
        </form>
      </div>
      <div class="card">
        <div class="card-title">Change Password</div>
        <form method="POST">
          <input type="hidden" name="full_name" value="{{ u.full_name }}">
          <input type="hidden" name="preferred_language" value="{{ u.preferred_language }}">
          <div class="form-group">
            <label class="form-label">Current Password</label>
            <input class="input" name="current_password" type="password">
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input class="input" name="new_password" type="password" minlength="6">
          </div>
          <button class="btn btn-secondary">Update Password</button>
        </form>
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid #e5e7eb">
          <div class="muted">Account Status</div>
          <span class="tag tag-green" style="margin-top:6px">Active</span>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
