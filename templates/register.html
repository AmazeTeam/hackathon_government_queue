{% extends 'base.html' %}
{% block title %}Register – GovQueue{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:380px">
    <div class="card">
      <h2 style="font-size:20px;font-weight:600;margin-bottom:4px">Create Account</h2>
      <p class="muted" style="margin-bottom:20px">Join GovQueue to book queue slots</p>
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="input" name="full_name" required placeholder="Mohamed Ahmed">
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input class="input" name="phone" type="tel" required placeholder="+20100000000">
        </div>
        <div class="form-group">
          <label class="form-label">National ID (optional)</label>
          <input class="input" name="national_id" placeholder="29xxxxxxxxxx">
        </div>
        <div class="form-group">
          <label class="form-label">Password *</label>
          <input class="input" name="password" type="password" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password *</label>
          <input class="input" name="confirm_password" type="password" required>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center">Register</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:13px;color:#6b7280">
        Already have an account? <a href="/login">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
