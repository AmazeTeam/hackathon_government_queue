{% extends 'base.html' %}
{% block title %}Register – GovQueue{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:380px">
    <div class="card">
      <h2 style="font-size:20px;font-weight:600;margin-bottom:4px">Create Account</h2>
      <p class="muted" style="margin-bottom:20px">Register with your phone number</p>

      {% if step == 'verify' %}
      <form method="POST">
        <input type="hidden" name="action" value="verify">
        <input type="hidden" name="full_name" value="{{ name }}">
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input class="input" name="phone" type="tel" value="{{ phone }}" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">OTP Code</label>
          <input class="input" name="otp" type="text" placeholder="123456" required autofocus>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center">Verify & Register</button>
      </form>
      {% else %}
      <form method="POST">
        <input type="hidden" name="action" value="request">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="input" name="full_name" required placeholder="Mohamed Ahmed">
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input class="input" name="phone" type="tel" required placeholder="+20100000000">
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center">Send OTP</button>
      </form>
      {% endif %}

      <p style="text-align:center;margin-top:16px;font-size:13px;color:#6b7280">
        Already have an account? <a href="/login">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
